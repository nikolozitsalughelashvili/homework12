        <footer id="contact">
          <section class="contact">
            <div class="isari">
              <svg
                preserveAspectRatio="none"
                data-bbox="72.5 20 55 160"
                viewBox="72.5 20 55 160"
                height="200"
                width="200"
                xmlns="http://www.w3.org/2000/svg"

                    d="M127.5 49.186L100 20 72.5 49.186l2.957 2.808 22.116-23.476V180h4.854V28.518l22.116 23.476 2.957-2.808z"
                  ></path>

            </div>
            <h1>Drop Me a Line, Let Me Know What You Think</h1>

            <!-- ეს ფორმის დასაწყისია, სადაც არის სხვადასხვა ველები სახელის, ელფოსტის და მესიჯის შესასვლელად -->

            <form action="">
              <div class="names">
                <div class="form-group">
                  <!-- ეს სახელის ველია, სადაც შეგვიძლია ჩავწეროთ სახელი -->
                  <label for="fname">First Name *</label>

                  <input
                    class="fname"
                    type="text"
                    id="fname"
                    name="fname"
                    required
                  />
                  <!-- ეს requ სავალდებულოა და არ იმუშავებს ფორმა თუ ეს ველი ცარიელია -->
                </div>
                <div class="form-group">
                  <!-- ეს გვარის ველია, სადაც შეგვიძლია ჩავწეროთ გვარი -->
                  <label for="lname">Last Name *</label>

                  <input
                    class="lname"
                    type="text"
                    id="lname"
                    name="lname"
                    required
                  />
                </div>
              </div>

              <!-- ეს იმეილეგვიძლია ჩავწეროთ იმეილი -->
              <div class="form-group">
                <label for="emailId">Email *</label>
                <input
                  class="emailinput"
                  type="email"
                  id="emailId"
                  name="email"
                  required
                />
              </div>

              <div class="message form-group">
                <!-- ესიჯი, სპეციალური თეგი გამოვიყენეთ დიდი ადგილისთვის -->
                <label for="message">message...</label>

                <textarea
                  class="messageinput"
                  id="message"
                  name="message"
                  rows="5"
                  required
                ></textarea>
              </div>
              <!-- ეს კი ფორმის გასაშვები ღილაკია -->
              <button class="submit" type="submit">Submit</button>
            </form>
          </section>
